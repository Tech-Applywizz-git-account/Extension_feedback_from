<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autofill extension feedback form</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>

<body>
    <div class="page-wrapper">
        <div class="container">
            <header>
                <div class="header-content">
                    <h1 id="mainTitle">Autofill extension feedback form</h1>
                    <p>We value your feedback to improve the extension.</p>
                </div>
            </header>

            <div class="tabs">
                <button class="tab-btn active" data-tab="feedback">Feedback Form</button>
                <button class="tab-btn" data-tab="assignment">User Assignment</button>
            </div>

            <div class="tab-content">
                <section id="assignment" class="tab-pane">
                    <h2>User Assignment</h2>
                    <form id="assignmentForm">
                        <div class="form-group">
                            <label for="emailSearch">Client Email</label>
                            <div class="searchable-select">
                                <input type="text" id="emailSearch" placeholder="Search or select an email..."
                                    autocomplete="off">
                                <div id="emailOptions" class="options-list">
                                    <!-- Options will be rendered here -->
                                </div>
                                <input type="hidden" id="clientEmail" name="clientEmail">
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="ca_name">CA Name</label>
                            <div class="searchable-select">
                                <input type="text" id="ca_name" name="ca_name" placeholder="Search or enter CA name..."
                                    autocomplete="off">
                                <div id="caNameOptions" class="options-list">
                                    <!-- Options will be rendered here -->
                                </div>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="ca_email">CA Email</label>
                            <div class="searchable-select">
                                <input type="email" id="ca_email" name="ca_email"
                                    placeholder="Search or enter CA email..." autocomplete="off">
                                <div id="caEmailOptions" class="options-list">
                                    <!-- Options will be rendered here -->
                                </div>
                            </div>
                        </div>

                        <button type="submit" id="assignBtn">
                            <span class="btn-text">Assign User</span>
                            <span class="loader"></span>
                        </button>
                    </form>
                </section>

                <section id="feedback" class="tab-pane active">
                    <h2>Send Feedback</h2>
                    <form id="feedbackForm">

                        <div class="form-group">
                            <label for="feedbackEmailSearch">Client Email</label>
                            <div class="searchable-select">
                                <input type="text" id="feedbackEmailSearch"
                                    placeholder="Search or select a client email..." autocomplete="off">
                                <div id="feedbackEmailOptions" class="options-list">
                                    <!-- Options will be rendered here -->
                                </div>
                                <input type="hidden" id="email" name="email">
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="feedbackNameSearch">Client Name</label>
                            <div class="searchable-select">
                                <input type="text" id="feedbackNameSearch"
                                    placeholder="Search or select a client name..." autocomplete="off">
                                <div id="feedbackNameOptions" class="options-list">
                                    <!-- Options will be rendered here -->
                                </div>
                                <input type="hidden" id="username" name="username">
                            </div>
                        </div>



                        <div class="form-group">
                            <label for="description">Description (Feedback/Bugs)</label>
                            <textarea id="description" name="description" rows="4"
                                placeholder="Describe your issue or feedback" required></textarea>
                        </div>

                        <div class="form-group">
                            <label>Screenshot</label>
                            <div class="file-input-wrapper">
                                <input type="file" id="screenshot" name="screenshot" accept="image/*" required>
                                <span class="file-custom">Choose image...</span>
                            </div>
                            <div id="imagePreview" class="image-preview" style="display: none;">
                                <!-- Preview image will be injected here -->
                                <button type="button" id="removeImage" class="remove-btn"
                                    title="Remove image">&times;</button>
                            </div>
                            <small>Max size: 5MB</small>
                        </div>

                        <button type="submit" id="submitBtn">
                            <span class="btn-text">Submit Feedback</span>
                            <span class="loader"></span>
                        </button>
                    </form>
                </section>
            </div>

            <div id="statusMessage" class="status-message"></div>
            <div id="toastContainer" class="toast-container"></div>
        </div>

        <!-- Separate Card for Unassigned Clients -->
        <div id="unassignedContainer" class="unassigned-card" style="display: none;">
            <div class="card-header">
                <h3>Pending Assignments <span id="pendingCountBadge" class="count-badge">0</span></h3>
                <div class="search-box-unassigned">
                    <input type="text" id="unassignedSearch" placeholder="Search clients..." autocomplete="off">
                    <div class="filter-tags" id="domainFilters">
                        <span class="filter-tag active" data-filter="all">All</span>
                        <span class="filter-tag" data-filter="gmail.com">Gmail</span>
                        <span class="filter-tag" data-filter="outlook.com">Outlook</span>
                    </div>
                </div>
                <p>Clients without an assigned CA</p>
            </div>
            <div id="unassignedList" class="unassigned-list">
                <!-- Unassigned items will be rendered here -->
            </div>
        </div>
    </div>

    <script type="module" src="/script.js"></script>
</body>

</html>
